name: CI

# Build + testes a cada push na main e em todo Pull Request.
# Não usa secrets nem provedores de IA: o teste de contexto (@SpringBootTest)
# fica desabilitado por padrão (RUN_CONTEXT_TEST não é definido), e o
# TransactionValidatorTest cobre as regras de negócio offline.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancela execuções antigas do mesmo branch/PR quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write        # permite publicar o relatório de testes como check

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21 (Temurin) + cache Maven
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build e testes (Maven)
        run: ./mvnw -B verify

      - name: Publicar relatório de testes
        if: always()        # roda mesmo se os testes falharem, p/ mostrar o que quebrou
        uses: dorny/test-reporter@v2
        with:
          name: Testes JUnit
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload artefatos de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*'
          retention-days: 7
          if-no-files-found: ignore