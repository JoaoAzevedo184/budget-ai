services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: budget
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
    ports:
      - "5432:5432"
    volumes:
      - budget_pgdata:/var/lib/postgresql/data

  # Ollama opcional via container (alternativa ao Ollama no host)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - budget_ollama:/root/.ollama

volumes:
  budget_pgdata:
  budget_ollama:
