# ── DEV: Ollama local (homelab, sem custo, offline) ──────────────────────────
# Apenas chat de texto (/api/ai/chat). Ollama não cobre áudio: /api/ai/voice
# retorna 501 neste perfil. Para voz, use um perfil cloud (áudio via OpenAI).
spring:
  config:
    activate:
      on-profile: ollama
  ai:
    openai:
      api-key: not-needed-in-ollama-profile
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:latest
          temperature: 0.2
    model:
      chat: ollama