# ─────────────────────────────────────────────────────────────────────────────
# Budget AI — configuração base
# O provedor de IA é selecionado pelo profile ativo (BUDGET_AI_PROVIDER).
#   export BUDGET_AI_PROVIDER=ollama   (padrão para dev)
# ─────────────────────────────────────────────────────────────────────────────
spring.application.name=budget-ai
spring.profiles.active=${BUDGET_AI_PROVIDER:ollama}

# H2 em memória (dev). Para PostgreSQL, use o profile do compose.
spring.datasource.url=jdbc:h2:mem:budget
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
