# ── PROD: Anthropic Claude (chat via endpoint OpenAI-compatible) ─────────────
spring:
  config:
    activate:
      on-profile: claude
  ai:
    model:
      chat: openai
      audio:
        transcription: openai
        speech: openai
    openai:
      base-url: https://api.anthropic.com
      api-key: ${CLAUDE_API_KEY}
      chat:
        completions-path: /v1/chat/completions
        options:
          model: claude-sonnet-4-6
      # Áudio: Anthropic não tem Whisper/TTS — usa OpenAI só para áudio.
      audio:
        transcription:
          base-url: https://api.openai.com
          api-key: ${OPENAI_API_KEY}
          options:
            model: whisper-1
            language: pt
            temperature: 0
            response-format: text
        speech:
          base-url: https://api.openai.com
          api-key: ${OPENAI_API_KEY}
          options:
            model: gpt-4o-mini-tts
            voice: nova
            speed: 1.2
            response-format: mp3